name: sample_message_app

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sample_message_app_development}
    ports:
      - "5433:5432"
    volumes:
      - postgres17_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    environment:
      DATABASE_URL: ${LOCAL_DATABASE_URL:-postgres://postgres:postgres@db:5432/sample_message_app_development}
      DB_HOST: ${DB_HOST:-db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-docker_development_secret_key_base}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password123}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - bundle_data:/bundle
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    stdin_open: true
    tty: true

volumes:
  bundle_data:
  frontend_node_modules:
  postgres17_data:
