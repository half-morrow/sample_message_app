services:
  backend:
    environment:
      DATABASE_URL: ${E2E_DATABASE_URL:-postgres://postgres:postgres@db:5432/sample_message_app_e2e}
      FRONTEND_ORIGIN: http://frontend:5173

  frontend:
    environment:
      VITE_API_BASE_URL: http://backend:3000

  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /app
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      - frontend
    command: npm run test:e2e
